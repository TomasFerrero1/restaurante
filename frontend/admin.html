<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — La Cantina</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --negro: #0f0f0f;
      --dorado: #c9a84c;
      --blanco: #ffffff;
      --gris: #f5f5f0;
      --gris2: #e8e8e0;
      --texto: #333;
      --texto-suave: #666;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    body { font-family: 'Inter', sans-serif; background: var(--gris); color: var(--texto); min-height: 100vh; }

    /* LOGIN */
    .login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--blanco);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%; max-width: 400px;
      box-shadow: var(--shadow);
    }
    .login-card h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; margin-bottom: 0.3rem;
    }
    .login-card p { color: var(--texto-suave); font-size: 0.9rem; margin-bottom: 1.8rem; }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem; }
    .form-group input, .form-group select {
      width: 100%; padding: 0.7rem 1rem;
      border: 1.5px solid var(--gris2); border-radius: var(--radius);
      font-size: 0.95rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--dorado); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.7rem 1.4rem; border-radius: var(--radius);
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
      border: none; transition: all 0.2s;
    }
    .btn-primary { background: var(--negro); color: var(--blanco); }
    .btn-primary:hover { background: var(--dorado); color: var(--negro); }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #dc2626; color: white; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }

    .error-msg { color: #dc2626; font-size: 0.85rem; margin-top: 0.8rem; display: none; }

    /* DASHBOARD */
    .dashboard { display: none; }

    .topbar {
      background: var(--negro); color: var(--blanco);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; color: var(--dorado); }
    .topbar-right { display: flex; align-items: center; gap: 1rem; font-size: 0.85rem; }
    .topbar-right button {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 0.4rem 0.9rem; border-radius: 8px;
      cursor: pointer; font-size: 0.82rem; transition: all 0.2s;
    }
    .topbar-right button:hover { border-color: var(--dorado); color: var(--dorado); }

    .main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--blanco); border-radius: var(--radius);
      padding: 1.2rem 1.5rem; box-shadow: var(--shadow);
    }
    .stat-card .num { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; color: var(--dorado); }
    .stat-card .lbl { font-size: 0.85rem; color: var(--texto-suave); }

    .panel {
      background: var(--blanco); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .panel-header {
      padding: 1.2rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--gris2);
    }
    .panel-header h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.8rem 1.5rem; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--texto-suave); background: var(--gris); }
    td { padding: 1rem 1.5rem; font-size: 0.9rem; border-bottom: 1px solid var(--gris); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf8; }

    .badge {
      display: inline-block; padding: 0.2rem 0.7rem;
      border-radius: 999px; font-size: 0.75rem; font-weight: 500;
    }
    .badge-active { background: #dcfce7; color: #15803d; }
    .badge-inactive { background: #fee2e2; color: #dc2626; }

    .td-actions { display: flex; gap: 0.5rem; }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--blanco); border-radius: 16px;
      padding: 2rem; width: 100%; max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }
    .modal h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; margin-bottom: 1.5rem; }
    .modal-footer { display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn-outline { background: none; border: 1.5px solid var(--gris2); color: var(--texto); }
    .btn-outline:hover { border-color: var(--negro); }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>Panel Admin</h1>
      <p>La Cantina — Acceso restringido</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@cantina.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-full" onclick="login()">Ingresar</button>
      <p class="error-msg" id="loginError">Credenciales incorrectas</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="topbar">
      <span class="topbar-logo">La Cantina — Admin</span>
      <div class="topbar-right">
        <span id="adminNombre"></span>
        <button onclick="logout()">Cerrar sesión</button>
      </div>
    </div>

    <div class="main">
      <div class="stats-row">
        <div class="stat-card">
          <div class="num" id="statProductos">—</div>
          <div class="lbl">Productos totales</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statActivos">—</div>
          <div class="lbl">Productos activos</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statCategorias">—</div>
          <div class="lbl">Categorías</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Productos</h2>
          <button class="btn btn-primary btn-sm" onclick="abrirModal()">
            <i class="ti ti-plus"></i> Nuevo producto
          </button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaProductos"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MODAL PRODUCTO -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitulo">Nuevo producto</h3>
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="pNombre" placeholder="Ej: Milanesa napolitana" />
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <input type="text" id="pDescripcion" placeholder="Descripción breve" />
      </div>
      <div class="form-group">
        <label>Precio</label>
        <input type="number" id="pPrecio" placeholder="0" />
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="pCategoria"></select>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="pDisponible">
          <option value="true">Disponible</option>
          <option value="false">No disponible</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarProducto()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
